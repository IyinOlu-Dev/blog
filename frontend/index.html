<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social App - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tight">FastAPI Social</a>
            <div id="nav-links" class="space-x-4 flex items-center">
                </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        <div id="alert-box" class="hidden mb-4 p-4 rounded text-center font-semibold"></div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Latest Snippets</h2>
            <a id="create-post-btn" href="create-post.html" class="hidden bg-green-600 text-white px-4 py-2 rounded font-medium hover:bg-green-700 transition">
                + New Post
            </a>
        </div>

        <div id="feed-container" class="grid gap-4">
            <p class="text-gray-500 text-center py-6">Loading posts...</p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Load the main feed when the page DOM is ready
        document.addEventListener("DOMContentLoaded", loadFeed);
    </script>
</body>
</html>
