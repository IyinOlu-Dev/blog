<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social App - Create Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tight">FastAPI Social</a>
            <div id="nav-links" class="space-x-4">
                </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-4 mt-8">
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Draft a New Entry</h2>
            
            <div id="alert-box" class="hidden mb-4 p-3 rounded text-sm text-center font-semibold"></div>

            <form onsubmit="handleCreatePost(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-1">Title</label>
                    <input type="text" id="post-title" required class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-1">Content Body</label>
                    <textarea id="post-content" rows="6" required class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="mb-6 flex items-center">
                    <input type="checkbox" id="post-published" class="mr-2 h-4 w-4 rounded text-blue-600 border-gray-300 focus:ring-blue-500">
                    <label for="post-published" class="text-gray-700 font-medium select-none">Publish immediately</label>
                </div>
                <div class="flex justify-end space-x-2">
                    <a href="index.html" class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500 transition">Cancel</a>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Publish Post</button>
                </div>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Route protection mechanism
        document.addEventListener("DOMContentLoaded", () => {
            if (!localStorage.getItem('access_token')) {
                window.location.href = 'auth.html';
            }
        });
    </script>
</body>
</html>
